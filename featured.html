<div id="toast"></div>
<script src="js/storage.js"></script>
<script src="js/auth.js"></script>
<script src="js/utils.js"></script>
<script>
  if (!Auth.requireAuth()) throw new Error('auth');
  Utils.initTheme();
  Storage.initMockData();

  Auth.renderAvatar(document.getElementById('userAvatar'));

  function render() {
    const books   = Storage.getBooks();
    const records = Storage.getRecords();

    // Build category collections
    const cats = {};
    books.forEach(b => {
      const cat = b.category || '其他';
      if (!cats[cat]) cats[cat] = [];
      cats[cat].push(b);
    });

    const catEmojis = {
      '文學':'📖', '設計':'✏️', '藝術':'🎨', '攝影':'📷', '歷史':'🏛️',
      '科學':'🔬', '心靈':'🧘', '自我成長':'🌱', '旅行':'🗺️', '料理':'🍳',
      '技術':'💻', '心理學':'🧠', '商業':'💼', '其他':'📚',
    };

    const catGradients = {
      '文學':'linear-gradient(135deg,#8B5E3C,#C4956A)',
      '設計':'linear-gradient(135deg,#4A6A9A,#7AAAD0)',
      '藝術':'linear-gradient(135deg,#C0392B,#E74C3C)',
      '攝影':'linear-gradient(135deg,#2C3E50,#4A6FA5)',
      '歷史':'linear-gradient(135deg,#6B4C2A,#A0724A)',
      '科學':'linear-gradient(135deg,#2D6A4F,#52B788)',
      '心靈':'linear-gradient(135deg,#7B8D97,#A8C5D6)',
      '自我成長':'linear-gradient(135deg,#4A8C6B,#74C69D)',
      '旅行':'linear-gradient(135deg,#D4874A,#E8B08A)',
      '料理':'linear-gradient(135deg,#C4956A,#DDB48C)',
      '技術':'linear-gradient(135deg,#2C3E50,#546E7A)',
      '心理學':'linear-gradient(135deg,#1A3A5C,#3A6A9C)',
      '商業':'linear-gradient(135deg,#4A3520,#8B5E3C)',
      '其他':'linear-gradient(135deg,#5A5A5A,#8A8A8A)',
    };

    // Also add status-based collections
    const statusCols = [
      { name:'閱讀中', status:'reading', emoji:'📖', gradient:'linear-gradient(135deg,#2D6A4F,#74C69D)', books: books.filter(b => records[b.id]?.status==='reading') },
      { name:'已讀完', status:'completed', emoji:'✅', gradient:'linear-gradient(135deg,#6B4C2A,#A0724A)', books: books.filter(b => records[b.id]?.status==='completed') },
      { name:'想讀的書', status:'want', emoji:'🔖', gradient:'linear-gradient(135deg,#4A5568,#718096)', books: books.filter(b => !records[b.id] || records[b.id]?.status==='want-to-read') },
      { name:'5星好書', status:'top', emoji:'⭐', gradient:'linear-gradient(135deg,#B7791F,#D4A843)', books: books.filter(b => records[b.id]?.rating === 5) },
    ];

    const allCollections = [
      ...statusCols.filter(c => c.books.length > 0),
      ...Object.entries(cats).map(([cat, catBooks]) => ({
        name: cat,
        emoji: catEmojis[cat] || '📚',
        gradient: catGradients[cat] || 'linear-gradient(135deg,#5A5A5A,#8A8A8A)',
        books: catBooks,
        category: cat,
      })),
    ];

    document.getElementById('collectionsGrid').innerHTML = allCollections.map(col => `
      <div class="collection-card" onclick="openCollection('${col.category || col.status}', '${Utils.escHtml(col.name)}')">
        <div class="collection-cover" style="background:${col.gradient}">
          <span style="font-size:2.5rem">${col.emoji}</span>
          <div style="position:absolute;bottom:8px;right:10px;font-size:0.72rem;color:rgba(255,255,255,0.7);font-weight:500">
            ${col.books.length} 本
          </div>
        </div>
        <div class="collection-info">
          <div class="collection-name">${Utils.escHtml(col.name)}</div>
          <div class="collection-count">${col.books.length} 本書</div>
        </div>
      </div>`).join('');
  }

  window.openCollection = function(key, name) {
    // Navigate to library with filter
    const params = new URLSearchParams();
    if (['reading','completed','want','top'].includes(key)) {
      params.set('status', key);
    } else {
      params.set('category', name);
    }
    location.href = 'library.html?' + params.toString();
  };

  render();
</script>
</body>
