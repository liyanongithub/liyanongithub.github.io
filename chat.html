<!DOCTYPE html>
<html lang="zh-TW" data-theme="normal">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>圖書館員 — Nordic Digital Library</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/bookshelf.css">
  <link rel="stylesheet" href="css/themes.css">
  <style>
    .chat-layout {
      display: flex;
      flex-direction: column;
      height: calc(100vh - var(--header-height));
      max-width: 820px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* Librarian header card */
    .librarian-card {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 20px 24px;
      background: var(--sidebar-bg);
      border-bottom: 1px solid var(--sidebar-border);
      flex-shrink: 0;
    }

    .librarian-avatar-large {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--wood-medium);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      flex-shrink: 0;
      box-shadow: 0 4px 14px rgba(107,76,42,0.3);
    }

    .librarian-info h2 {
      font-family: var(--font-serif);
      font-size: 1.2rem;
      font-weight: 500;
      color: var(--text-dark);
      margin-bottom: 3px;
    }

    .librarian-info p {
      font-size: 0.78rem;
      color: var(--text-light);
      font-style: italic;
    }

    .librarian-status {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.7rem;
      color: var(--status-reading);
      font-style: normal;
    }

    .librarian-status::before {
      content: '';
      width: 7px;
      height: 7px;
      background: var(--status-reading);
      border-radius: 50%;
      flex-shrink: 0;
    }

    .librarian-card-actions {
      margin-left: auto;
    }

    /* Messages area */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 0;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }

    .message {
      display: flex;
      gap: 12px;
      max-width: 85%;
      animation: msgIn 0.2s ease;
    }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .message-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: var(--wood-medium);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      align-self: flex-end;
    }

    .message.user .message-avatar {
      background: var(--accent);
      font-size: 13px;
      font-weight: 600;
      color: #fff;
    }

    .message-bubble {
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 0.9rem;
      line-height: 1.65;
      color: var(--text-dark);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.assistant .message-bubble {
      background: var(--sidebar-bg);
      border: 1px solid var(--sidebar-border);
      border-bottom-left-radius: 4px;
    }

    .message.user .message-bubble {
      background: var(--accent);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .message-time {
      font-size: 0.65rem;
      color: var(--text-muted);
      margin-top: 4px;
      padding: 0 4px;
    }

    .message.user .message-time { text-align: right; }

    /* Typing indicator */
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 12px 16px;
      background: var(--sidebar-bg);
      border: 1px solid var(--sidebar-border);
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      width: fit-content;
    }

    .typing-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: typing 1.2s ease infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typing {
      0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
      30% { opacity: 1; transform: translateY(-4px); }
    }

    /* Quick action buttons */
    .quick-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 12px 0;
      flex-shrink: 0;
    }

    .quick-btn {
      padding: 7px 14px;
      border-radius: 18px;
      font-size: 0.78rem;
      font-weight: 500;
      background: var(--accent-light);
      border: 1px solid var(--sidebar-border);
      color: var(--accent);
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .quick-btn:hover {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    /* Input area */
    .chat-input-area {
      flex-shrink: 0;
      border-top: 1px solid var(--sidebar-border);
      padding: 16px 0 24px;
    }

    .chat-input-row {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: var(--sidebar-bg);
      border: 1.5px solid var(--sidebar-border);
      border-radius: 16px;
      padding: 10px 14px;
      transition: border-color 0.2s;
    }

    .chat-input-row:focus-within {
      border-color: var(--wood-warm);
      box-shadow: 0 0 0 3px rgba(176,125,78,0.1);
    }

    .chat-textarea {
      flex: 1;
      border: none;
      background: transparent;
      outline: none;
      resize: none;
      font-size: 0.9rem;
      font-family: var(--font-sans);
      color: var(--text-dark);
      line-height: 1.5;
      max-height: 120px;
      min-height: 24px;
    }

    .chat-textarea::placeholder { color: var(--text-muted); }

    .send-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      flex-shrink: 0;
      border: none;
    }

    .send-btn:hover { background: var(--wood-dark); transform: scale(1.05); }
    .send-btn:disabled { background: var(--sidebar-border); cursor: not-allowed; transform: none; }

    /* No API key banner */
    .no-key-banner {
      background: rgba(176,125,78,0.1);
      border: 1px solid rgba(176,125,78,0.3);
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 12px;
      font-size: 0.82rem;
      color: var(--text-medium);
      display: none;
    }

    .no-key-banner a {
      color: var(--accent);
      text-decoration: underline;
    }

    /* Welcome message */
    .welcome-zone {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 16px;
      text-align: center;
      color: var(--text-light);
      padding: 40px;
    }

    .welcome-emoji { font-size: 3rem; }

    .welcome-zone h3 {
      font-family: var(--font-serif);
      font-size: 1.4rem;
      font-weight: 400;
      color: var(--text-medium);
    }

    .welcome-zone p { font-size: 0.85rem; font-style: italic; }

    /* Bold/italic in assistant messages */
    .message-bubble strong { font-weight: 700; }
    .message-bubble em { font-style: italic; }

    @media (max-width: 768px) {
      .chat-layout { padding: 0 12px; }
    }
  </style>
</head>
<body>

<div class="app-layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon">📚</div>
    </div>
    <nav class="sidebar-nav">
      <a href="index.html" class="nav-item" title="Dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
        <span class="nav-label">Dashboard</span>
      </a>
      <a href="library.html" class="nav-item" title="My Library">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
        </svg>
        <span class="nav-label">My Library</span>
      </a>
      <a href="featured.html" class="nav-item" title="Featured">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
        </svg>
        <span class="nav-label">Featured</span>
      </a>
      <a href="authors.html" class="nav-item" title="Authors">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        <span class="nav-label">Authors</span>
      </a>
      <a href="chat.html" class="nav-item active" title="Chat">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        <span class="nav-label">Chat</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <a href="settings.html" class="nav-item" title="Settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        <span class="nav-label">Settings</span>
      </a>
    </div>
  </aside>

  <div class="main-area">
    <!-- Header -->
    <header class="header">
      <div style="width:60px"></div>
      <h1 class="header-title">Nordic Digital Library</h1>
      <div class="header-actions">
        <div class="header-avatar" id="userAvatar">R</div>
      </div>
    </header>

    <!-- Chat Layout -->
    <div class="chat-layout">

      <!-- Librarian Info Bar -->
      <div class="librarian-card">
        <div class="librarian-avatar-large">📚</div>
        <div class="librarian-info">
          <h2 id="librarianName">小書</h2>
          <p><span class="librarian-status">線上中</span> — 您的個人圖書館員</p>
        </div>
        <div class="librarian-card-actions">
          <button class="btn btn-secondary" onclick="clearChat()" title="清空對話">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.73"/>
            </svg>
            新對話
          </button>
        </div>
      </div>

      <!-- No API key banner -->
      <div class="no-key-banner" id="noKeyBanner">
        ⚠️ 尚未設定 OpenAI API Key。請先前往 <a href="settings.html">設定頁面</a> 填入您的 API Key，才能與圖書館員對話。
      </div>

      <!-- Messages -->
      <div class="chat-messages" id="chatMessages">
        <!-- Welcome state shown when no history -->
        <div class="welcome-zone" id="welcomeZone">
          <div class="welcome-emoji">📚</div>
          <h3>歡迎來找我聊聊</h3>
          <p>我是您的個人圖書館員，可以為您推薦書籍、<br>討論讀後心得，或幫您找到下一本好書。</p>
        </div>
      </div>

      <!-- Quick action buttons -->
      <div class="quick-actions" id="quickActions">
        <button class="quick-btn" onclick="quickSend('recommend')">✨ 推薦一本書給我</button>
        <button class="quick-btn" onclick="quickSend('discuss')">💬 聊聊我最近看的書</button>
        <button class="quick-btn" onclick="quickSend('relaxing')">🌿 我想找輕鬆的書</button>
        <button class="quick-btn" onclick="quickSend('educational')">📖 推薦知識性的書</button>
      </div>

      <!-- Input -->
      <div class="chat-input-area">
        <div class="chat-input-row">
          <textarea class="chat-textarea" id="chatInput"
            placeholder="輸入訊息… (Enter 送出，Shift+Enter 換行)"
            rows="1"></textarea>
          <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="送出">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
        <div style="text-align:center;margin-top:8px;font-size:0.68rem;color:var(--text-muted)">
          由 OpenAI 驅動 · API key 僅存於本機瀏覽器
        </div>
      </div>

    </div>
  </div>
</div>

<div id="toast"></div>

<script src="js/storage.js"></script>
<script src="js/utils.js"></script>
<script src="js/openai.js"></script>
<script>
  Utils.initTheme();

  let chatHistory = [];
  let isLoading   = false;

  const settings = Storage.getSettings();

  // Set librarian name
  document.getElementById('librarianName').textContent =
    settings.librarianName || '小書';

  // Update avatar
  const userName = settings.userName || '';
  document.getElementById('userAvatar').textContent = userName.charAt(0).toUpperCase() || '📚';

  // Check API key
  function checkApiKey() {
    const hasKey = !!Storage.getSetting('openaiApiKey');
    document.getElementById('noKeyBanner').style.display = hasKey ? 'none' : 'block';
    document.getElementById('sendBtn').disabled = !hasKey;
    return hasKey;
  }

  // Load chat history
  function loadHistory() {
    chatHistory = Storage.getChatHistory();
    const messagesEl = document.getElementById('chatMessages');

    if (chatHistory.length === 0) {
      document.getElementById('welcomeZone').style.display = 'flex';
      return;
    }

    document.getElementById('welcomeZone').style.display = 'none';
    messagesEl.innerHTML = chatHistory.map(renderMessage).join('');
    scrollToBottom();
  }

  function renderMessage(msg) {
    const isUser = msg.role === 'user';
    const name   = isUser
      ? (Storage.getSetting('userName') || 'You')
      : (Storage.getSetting('librarianName') || '小書');
    const initial = isUser ? (name.charAt(0).toUpperCase() || 'U') : '📚';
    const timeStr = msg.timestamp
      ? new Date(msg.timestamp).toLocaleTimeString('zh-TW', { hour:'2-digit', minute:'2-digit' })
      : '';

    // Render markdown-lite (bold, italic)
    const rendered = Utils.escHtml(msg.content)
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g,     '<em>$1</em>');

    return `
      <div class="message ${isUser ? 'user' : 'assistant'}">
        <div class="message-avatar">${initial}</div>
        <div>
          <div class="message-bubble">${rendered}</div>
          <div class="message-time">${timeStr}</div>
        </div>
      </div>`;
  }

  function addMessageToUI(role, content) {
    const welcomeZone = document.getElementById('welcomeZone');
    if (welcomeZone) welcomeZone.style.display = 'none';

    const msg = { role, content, timestamp: new Date().toISOString() };
    const el  = document.createElement('div');
    el.innerHTML = renderMessage(msg);
    document.getElementById('chatMessages').appendChild(el.firstElementChild);
    scrollToBottom();
    return msg;
  }

  function showTyping() {
    const el = document.createElement('div');
    el.id = 'typingIndicator';
    el.className = 'message assistant';
    el.innerHTML = `
      <div class="message-avatar">📚</div>
      <div class="typing-indicator">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>`;
    document.getElementById('chatMessages').appendChild(el);
    scrollToBottom();
  }

  function hideTyping() {
    document.getElementById('typingIndicator')?.remove();
  }

  function scrollToBottom() {
    const el = document.getElementById('chatMessages');
    el.scrollTop = el.scrollHeight;
  }

  // Send message
  async function sendMessage(text) {
    if (!checkApiKey()) { location.href = 'settings.html'; return; }

    const input = document.getElementById('chatInput');
    const content = (text || input.value).trim();
    if (!content || isLoading) return;

    input.value = '';
    input.style.height = 'auto';
    isLoading = true;
    document.getElementById('sendBtn').disabled = true;

    // Add user message
    const userMsg = addMessageToUI('user', content);
    chatHistory.push(userMsg);
    Storage.addChatMessage('user', content);

    // Show typing
    showTyping();

    try {
      const reply = await OpenAI.chat(chatHistory);
      hideTyping();
      const assistantMsg = addMessageToUI('assistant', reply);
      chatHistory.push(assistantMsg);
      Storage.addChatMessage('assistant', reply);
    } catch (err) {
      hideTyping();
      const errMsg = OpenAI.getErrorMessage(err);
      addMessageToUI('assistant', errMsg);
    } finally {
      isLoading = false;
      document.getElementById('sendBtn').disabled = !checkApiKey();
    }
  }

  // Quick action buttons
  window.quickSend = function(action) {
    let text;
    switch (action) {
      case 'recommend':   text = OpenAI.promptRecommend();           break;
      case 'discuss':     text = OpenAI.promptDiscussRecent();       break;
      case 'relaxing':    text = OpenAI.promptFindByMood('relaxing');break;
      case 'educational': text = OpenAI.promptFindByMood('educational');break;
      default: return;
    }
    sendMessage(text);
  };

  // Clear chat
  window.clearChat = function() {
    if (chatHistory.length > 0 && !confirm('確定要清空所有對話記錄嗎？')) return;
    Storage.clearChatHistory();
    chatHistory = [];
    document.getElementById('chatMessages').innerHTML = `
      <div class="welcome-zone" id="welcomeZone">
        <div class="welcome-emoji">📚</div>
        <h3>新對話開始</h3>
        <p>有什麼我可以幫到你的嗎？</p>
      </div>`;
    Utils.showToast('對話已清空');
  };

  // Input: auto-resize + Enter to send
  const chatInput = document.getElementById('chatInput');
  chatInput.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });

  chatInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // Init
  checkApiKey();
  loadHistory();
</script>
</body>
</html>
