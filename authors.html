  <div class="main-area">
    <header class="header">
      <div style="width:60px"></div>
      <h1 class="header-title">Nordic Digital Library</h1>
      <div class="header-actions">
        <div class="header-avatar" id="userAvatar">R</div>
      </div>
    </header>

    <div class="page-content">
      <h2 class="page-title">Authors</h2>

      <!-- Selected author view -->
      <div id="authorDetail" style="display:none;margin-bottom:32px">
        <button onclick="closeAuthor()" class="btn btn-ghost" style="margin-bottom:16px">
          ← 回到作者列表
        </button>
        <div style="display:flex;align-items:center;gap:16px;margin-bottom:24px">
          <div class="author-avatar" id="detailAvatar" style="width:56px;height:56px;font-size:1.4rem"></div>
          <div>
            <h3 id="detailAuthorName" style="font-family:var(--font-serif);font-size:1.4rem;font-weight:400"></h3>
            <p id="detailAuthorCount" style="font-size:0.8rem;color:var(--text-light)"></p>
          </div>
        </div>
        <div class="library-grid" id="authorBooks"></div>
      </div>

      <!-- Authors grid -->
      <div id="authorsView">
        <div style="margin-bottom:20px">
          <label style="display:flex;align-items:center;gap:8px;border:1px solid var(--sidebar-border);border-radius:20px;padding:8px 14px;max-width:300px;background:var(--sidebar-bg)">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <input type="text" id="authorSearch" placeholder="搜尋作者…"
              style="border:none;background:transparent;outline:none;font-size:0.85rem;width:100%;color:var(--text-dark)">
          </label>
        </div>
        <div class="author-grid" id="authorGrid"></div>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>
<script src="js/storage.js"></script>
<script src="js/utils.js"></script>
<script>
  Utils.initTheme();
  Storage.initMockData();

  const name = Storage.getSetting('userName') || '';
  document.getElementById('userAvatar').textContent = name.charAt(0).toUpperCase() || '📚';

  let allAuthors = [];

  function render(query = '') {
    const books   = Storage.getBooks();
    const records = Storage.getRecords();

    // Group by author
    const authorMap = {};
    books.forEach(b => {
      const author = b.author?.trim() || '未知作者';
      if (!authorMap[author]) authorMap[author] = [];
      authorMap[author].push(b);
    });

    allAuthors = Object.entries(authorMap)
      .sort((a, b) => b[1].length - a[1].length);

    const filtered = query
      ? allAuthors.filter(([a]) => a.toLowerCase().includes(query.toLowerCase()))
      : allAuthors;

    document.getElementById('authorGrid').innerHTML = filtered.map(([author, bks]) => {
      const initial = author.charAt(0).toUpperCase();
      const color   = Utils.generateColor(author);
      const avgRating = bks.reduce((sum, b) => {
        const r = records[b.id]?.rating || 0;
        return sum + r;
      }, 0) / bks.filter(b => records[b.id]?.rating).length || 0;

      return `
        <div class="author-card" onclick="openAuthor('${Utils.escHtml(author)}')">
          <div class="author-avatar" style="background:${color}">${initial}</div>
          <div class="author-name">${Utils.escHtml(author)}</div>
          <div class="author-count">${bks.length} 本書${avgRating ? ` · ⭐ ${avgRating.toFixed(1)}` : ''}</div>
        </div>`;
    }).join('');

    if (filtered.length === 0) {
      document.getElementById('authorGrid').innerHTML =
        '<p style="color:var(--text-muted);font-style:italic">找不到相符的作者</p>';
    }
  }

  window.openAuthor = function(author) {
    const books   = Storage.getBooks().filter(b => (b.author?.trim()||'未知作者') === author);
    const records = Storage.getRecords();
    const color   = Utils.generateColor(author);

    document.getElementById('authorsView').style.display = 'none';
    document.getElementById('authorDetail').style.display = 'block';
    document.getElementById('detailAvatar').textContent = author.charAt(0).toUpperCase();
    document.getElementById('detailAvatar').style.background = color;
    document.getElementById('detailAuthorName').textContent = author;
    document.getElementById('detailAuthorCount').textContent = `${books.length} 本藏書`;
    document.getElementById('authorBooks').innerHTML = books.map(b => Utils.renderLibraryCard(b, records[b.id])).join('');
  };

  window.closeAuthor = function() {
    document.getElementById('authorDetail').style.display = 'none';
    document.getElementById('authorsView').style.display  = 'block';
  };

  document.getElementById('authorSearch').addEventListener('input', Utils.debounce(function() {
    render(this.value);
  }, 250));

  render();
</script>
</body>
</html>
