<!DOCTYPE html>
<html lang="zh-TW" data-theme="normal">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nordic Digital Library</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/bookshelf.css">
  <link rel="stylesheet" href="css/themes.css">
  <style>
    /* Dashboard-specific overrides */
    body { overflow: hidden; }
    .main-area { height: 100vh; overflow: hidden; }
    .library-scene { height: calc(100vh - var(--header-height)); }

    /* Shelf sections layout */
    .shelf-sections {
      display: flex;
      flex-direction: column;
      height: 100%;
      padding: 0 0 80px;
      position: relative;
    }

    .shelf-row { flex: 1; }

    .shelf-books {
      height: calc(100% - 22px);
      align-items: flex-end;
      padding: 12px 32px 0 80px;
      gap: 8px;
    }

    /* Bottom scene area */
    .scene-floor {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 90px;
      background: linear-gradient(
        180deg,
        rgba(100, 70, 30, 0.15) 0%,
        rgba(80, 55, 20, 0.35) 100%
      );
      border-top: 3px solid rgba(0,0,0,0.12);
    }

    /* Librarian standing figure area */
    .librarian-zone {
      position: absolute;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 5;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      pointer-events: none;
    }

    .librarian-svg-wrap {
      pointer-events: all;
      cursor: pointer;
      transition: transform 0.3s ease;
    }
    .librarian-svg-wrap:hover { transform: scale(1.03); }

    /* Currently reading — positioned bottom right */
    .currently-reading {
      position: absolute;
      bottom: 100px;
      right: 52px;
      z-index: 6;
    }

    /* Sparkle accent */
    .sparkle-icon {
      position: absolute;
      bottom: 24px;
      right: 280px;
      z-index: 6;
      color: rgba(255,255,255,0.55);
      font-size: 30px;
      animation: sparkle-pulse 3s ease-in-out infinite;
      pointer-events: none;
    }

    /* Stats row in scene top bar */
    .scene-stats {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .stat-chip {
      background: rgba(255,255,255,0.65);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 16px;
      padding: 4px 12px;
      font-size: 0.72rem;
      color: var(--text-medium);
      font-weight: 500;
      white-space: nowrap;
    }

    .stat-chip strong {
      color: var(--text-dark);
    }

    /* Quick filter chips row */
    .filter-row {
      display: flex;
      gap: 7px;
      padding: 6px 32px 0 80px;
      flex-wrap: nowrap;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .filter-row::-webkit-scrollbar { display: none; }

    /* Bench element on floor */
    .scene-bench {
      position: absolute;
      bottom: 90px;
      left: 25%;
      right: 30%;
      height: 28px;
      background: linear-gradient(
        180deg,
        #c4956a 0%,
        #a07040 40%,
        #8b5e35 100%
      );
      border-radius: 4px;
      box-shadow: 0 6px 16px rgba(0,0,0,0.3);
      pointer-events: none;
    }

    .scene-bench::before,
    .scene-bench::after {
      content: '';
      position: absolute;
      bottom: -20px;
      width: 14px;
      height: 20px;
      background: #7a5030;
      border-radius: 0 0 3px 3px;
    }
    .scene-bench::before { left: 20px; }
    .scene-bench::after  { right: 20px; }

    /* Search modal */
    .search-modal-results {
      max-height: 360px;
      overflow-y: auto;
    }

    .search-result-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .search-result-item:hover { background: var(--accent-light); }

    .search-result-cover {
      width: 32px;
      height: 44px;
      border-radius: 3px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: rgba(255,255,255,0.8);
      font-weight: 600;
      overflow: hidden;
    }

    .search-result-info {}
    .search-result-title { font-size: 0.88rem; font-weight: 500; color: var(--text-dark); }
    .search-result-author { font-size: 0.72rem; color: var(--text-light); font-style: italic; }
  </style>
</head>

<script src="js/storage.js"></script>

<script src="js/utils.js"></script>
<script>
  if (!Auth.requireAuth()) throw new Error('auth');
  // ── Init ────────────────────────────────────────────────
  Storage.initMockData();
  Utils.initTheme();

  let allBooks   = Storage.getBooks();
  let allRecords = Storage.getRecords();
  let activeFilter = { category: 'all', status: 'all' };

  // ── Render bookshelf ────────────────────────────────────
  function renderShelves() {
    const books   = Storage.getBooks();
    const records = Storage.getRecords();

    // Filter books
    let filtered = Utils.filterBooks(books, records, {
      category: activeFilter.category !== 'all' ? activeFilter.category : null,
      status:   activeFilter.status   !== 'all' ? activeFilter.status   : null,
    });

    // Distribute books across 3 shelves
    const third = Math.ceil(filtered.length / 3);
    const shelves = [
      filtered.slice(0, third),
      filtered.slice(third, third * 2),
      filtered.slice(third * 2),
    ];

    const shelfIds = ['shelf1', 'shelf2', 'shelf3'];

    // Mixed face-out / spine-out for visual variety
    const patterns = [
      // Shelf 1: mostly face-out (top display shelf)
      (i) => 'face-out',
      // Shelf 2: alternating with some spines
      (i) => (i % 5 === 2 || i % 7 === 4) ? 'spine-out' : 'face-out',
      // Shelf 3: more spines
      (i) => (i % 3 === 1) ? 'spine-out' : 'face-out',
    ];

    shelfIds.forEach((id, si) => {
      const el = document.getElementById(id);
      const shelfBooks = shelves[si];

      if (!shelfBooks || shelfBooks.length === 0) {
        el.innerHTML = `<div class="empty-shelf-msg"><p>（空書架）</p></div>`;
        return;
      }

      el.innerHTML = shelfBooks.map((book, i) => {
        const rec   = records[book.id] || {};
        const type  = patterns[si](i);
        const color = book.coverColor || Utils.generateColor(book.id);
        const stars = rec.rating ? '★'.repeat(rec.rating) : '';
        const statusClass = rec.status || 'want-to-read';
        const statusLabel = Utils.statusText(rec.status);

        // Size variation
        const sizeClass = si === 0
          ? (i % 4 === 0 ? 'large' : '')
          : (i % 6 === 0 ? 'large' : i % 4 === 2 ? 'small' : '');

        const coverImg = book.coverUrl
          ? `<img src="${book.coverUrl}" alt="" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;">`
          : '';

        if (type === 'face-out') {
          const textColor = Utils.isLightColor(color) ? '#1e160a' : '#ffffff';
          return `
            <div class="book-card face-out ${sizeClass}" onclick="location.href='book.html?id=${encodeURIComponent(book.id)}'">
              <div class="book-cover" style="background:${color};position:relative;">
                ${coverImg}
                ${!book.coverUrl ? `
                  <div class="book-cover-inner" style="position:absolute;bottom:0;left:0;right:0;padding:6px;background:linear-gradient(0deg,rgba(0,0,0,0.65) 0%,transparent 100%);">
                    <div class="book-cover-title" style="color:#fff">${Utils.escHtml(book.title)}</div>
                    <div class="book-cover-author" style="color:rgba(255,255,255,0.8)">${Utils.escHtml(book.author||'')}</div>
                  </div>` : ''}
              </div>
              <div class="book-tooltip">
                <div class="tooltip-title">${Utils.escHtml(book.title)}</div>
                <div class="tooltip-author">${Utils.escHtml(book.author||'')}</div>
                <div class="tooltip-meta">
                  <span class="tooltip-rating">${stars || '—'}</span>
                  <span class="tooltip-status status-badge ${statusClass}">${statusLabel}</span>
                </div>
              </div>
            </div>`;
        } else {
          return `
            <div class="book-card spine-out ${si===0?'tall':''}" onclick="location.href='book.html?id=${encodeURIComponent(book.id)}'">
              <div class="book-spine" style="background:${color};">
                <span class="book-spine-text">${Utils.escHtml(book.title)}</span>
              </div>
              <div class="book-tooltip">
                <div class="tooltip-title">${Utils.escHtml(book.title)}</div>
                <div class="tooltip-author">${Utils.escHtml(book.author||'')}</div>
              </div>
            </div>`;
        }
      }).join('');
    });

    // Stats
    renderStats();
  }

  function renderStats() {
    const stats = Storage.getStats();
    document.getElementById('sceneStats').innerHTML = `
      <div class="stat-chip">📚 <strong>${stats.totalBooks}</strong> 本藏書</div>
      <div class="stat-chip">✅ <strong>${stats.completedThisYear}</strong> 今年已讀</div>
      ${stats.avgRating !== '—' ? `<div class="stat-chip">⭐ <strong>${stats.avgRating}</strong> 平均評分</div>` : ''}
      ${stats.topCategory ? `<div class="stat-chip">🏷️ <strong>${stats.topCategory}</strong></div>` : ''}
    `;
  }

  // ── Filter chips ────────────────────────────────────────
  function renderFilters() {
    const books    = Storage.getBooks();
    const cats     = Utils.getCategories(books).filter(c => c !== 'all');
    const statuses = ['reading', 'completed', 'want-to-read'];
    const statusLabels = { reading:'閱讀中', completed:'已讀', 'want-to-read':'想讀' };

    document.getElementById('filterRow').innerHTML = `
      <div class="filter-chip ${activeFilter.category==='all'?'active':''}"
           onclick="setFilter('category','all')">全部</div>
      ${cats.map(c => `
        <div class="filter-chip ${activeFilter.category===c?'active':''}"
             onclick="setFilter('category','${c}')">${c}</div>
      `).join('')}
      <div style="width:1px;background:rgba(255,255,255,0.3);margin:0 4px;align-self:stretch"></div>
      ${statuses.map(s => `
        <div class="filter-chip ${activeFilter.status===s?'active':''}"
             onclick="setFilter('status','${s}')">${statusLabels[s]}</div>
      `).join('')}
    `;
  }

  function setFilter(key, value) {
    if (key === 'category') {
      activeFilter.category = activeFilter.category === value ? 'all' : value;
    } else {
      activeFilter.status = activeFilter.status === value ? 'all' : value;
    }
    renderFilters();
    renderShelves();
  }

  // ── Currently reading widget ─────────────────────────────
  function renderCurrentlyReading() {
    const stats = Storage.getStats();
    const books  = stats.currentlyReading;
    const records = Storage.getRecords();

    if (books.length === 0) {
      document.getElementById('currentlyReading').style.display = 'none';
      return;
    }

    const book = books[0];
    const rec  = Storage.getRecord(book.id);

    document.getElementById('currentlyReading').style.display = 'block';
    document.getElementById('currentBookTitle').textContent = book.title;
    document.getElementById('currentBookProgress').textContent = `${rec.progress || 0}%`;
    document.getElementById('currentBookProgressBar').style.width = `${rec.progress || 0}%`;

    window._currentBookId = book.id;
  }

  window.goToCurrentBook = function() {
    if (window._currentBookId) {
      location.href = `book.html?id=${encodeURIComponent(window._currentBookId)}`;
    }
  };

  // ── Theme switcher ──────────────────────────────────────
  window.switchTheme = function(theme) {
    Utils.applyTheme(theme);
  };

  // ── Librarian bubble ────────────────────────────────────
  function randomGreeting() {
    const greetings = [
      '今天想讀點什麼？✨',
      '需要我推薦一本書嗎？',
      '歡迎回來！繼續閱讀吧。',
      '有什麼書想聊聊嗎？',
      '讓我來幫你找書！',
    ];
    const name = Storage.getSetting('librarianName') || '小書';
    const idx  = Math.floor(Date.now() / 60000) % greetings.length;
    document.getElementById('librarianBubble').textContent = greetings[idx];
  }

  // ── Search ──────────────────────────────────────────────
  document.getElementById('headerSearchTrigger').addEventListener('click', openSearch);

  function openSearch() {
    document.getElementById('searchModal').classList.add('open');
    setTimeout(() => document.getElementById('searchInput').focus(), 100);
  }

  window.closeSearch = function(e) {
    if (e.target === document.getElementById('searchModal')) {
      document.getElementById('searchModal').classList.remove('open');
    }
  };

  document.getElementById('searchInput').addEventListener('input', Utils.debounce(function() {
    const query = this.value.trim();
    if (!query) { document.getElementById('searchResults').innerHTML = ''; return; }

    const books   = Storage.getBooks();
    const records = Storage.getRecords();
    const results = Utils.filterBooks(books, records, { query }).slice(0, 12);

    document.getElementById('searchResults').innerHTML = results.length === 0
      ? `<p style="text-align:center;color:var(--text-light);padding:20px;font-style:italic;">找不到「${Utils.escHtml(query)}」相關的書</p>`
      : results.map(book => {
          const color = book.coverColor || Utils.generateColor(book.id);
          return `
            <div class="search-result-item" onclick="location.href='book.html?id=${encodeURIComponent(book.id)}'">
              <div class="search-result-cover" style="background:${color}">
                ${book.coverUrl ? `<img src="${book.coverUrl}" style="width:100%;height:100%;object-fit:cover;">` : ''}
              </div>
              <div class="search-result-info">
                <div class="search-result-title">${Utils.escHtml(book.title)}</div>
                <div class="search-result-author">${Utils.escHtml(book.author||'')}</div>
              </div>
            </div>`;
        }).join('');
  }, 200));

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') document.getElementById('searchModal').classList.remove('open');
    if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); openSearch(); }
  });

  // ── Init ─────────────────────────────────────────────────
  renderFilters();
  renderShelves();
  renderCurrentlyReading();
  randomGreeting();
  Auth.renderAvatar(document.getElementById('userAvatar'));

  // Apply saved theme
  const savedTheme = Storage.getSetting('readingMode') || 'normal';
  document.querySelectorAll('.theme-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.theme === savedTheme);
  });
</script>
</body>
</html>
