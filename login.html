<!DOCTYPE html>
<html lang="zh-TW" data-theme="normal">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登入 — Nordic Digital Library</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/themes.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--body-bg);
    }

    .login-wrap {
      width: 100%;
      max-width: 420px;
      padding: 24px;
    }

    .login-card {
      background: var(--sidebar-bg);
      border: 1px solid var(--sidebar-border);
      border-radius: 20px;
      padding: 44px 40px 40px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.10);
      text-align: center;
    }

    .login-logo {
      font-size: 3rem;
      margin-bottom: 12px;
      line-height: 1;
    }

    .login-title {
      font-family: var(--font-serif);
      font-size: 1.45rem;
      font-weight: 500;
      color: var(--text-dark);
      margin-bottom: 6px;
    }

    .login-subtitle {
      font-size: 0.82rem;
      color: var(--text-light);
      margin-bottom: 32px;
      line-height: 1.5;
    }

    /* ── Steps ── */
    .step { display: none; }
    .step.active { display: block; }

    /* ── Google button ── */
    .google-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 12px 20px;
      background: #fff;
      border: 1.5px solid #dadce0;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 500;
      color: #3c4043;
      cursor: pointer;
      transition: box-shadow 0.2s, background 0.2s;
      font-family: var(--font-sans);
    }
    .google-btn:hover {
      background: #f8f9fa;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    }
    .google-btn:active { background: #f1f3f4; }
    .google-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* ── Setup step ── */
    .setup-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-medium);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 20px;
    }

    .setup-input {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid var(--sidebar-border);
      border-radius: 8px;
      background: var(--body-bg);
      color: var(--text-dark);
      font-size: 0.82rem;
      font-family: monospace;
      margin-bottom: 10px;
      box-sizing: border-box;
      transition: border-color 0.2s;
    }
    .setup-input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .setup-hint {
      font-size: 0.74rem;
      color: var(--text-muted);
      line-height: 1.55;
      margin-bottom: 16px;
      text-align: left;
    }
    .setup-hint a { color: var(--accent); }

    .setup-btn {
      width: 100%;
      padding: 11px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .setup-btn:hover { opacity: 0.88; }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      font-size: 0.75rem;
      color: var(--text-muted);
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--sidebar-border);
    }

    .change-id-link {
      margin-top: 16px;
      font-size: 0.75rem;
      color: var(--text-muted);
      cursor: pointer;
      text-decoration: underline;
      background: none;
      border: none;
      font-family: inherit;
    }
    .change-id-link:hover { color: var(--accent); }

    .error-msg {
      margin-top: 14px;
      padding: 10px 14px;
      background: rgba(180,76,60,0.08);
      border: 1px solid rgba(180,76,60,0.25);
      border-radius: 8px;
      font-size: 0.78rem;
      color: #b44c3c;
      display: none;
    }
  </style>
</head>
<body>

<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">📚</div>
    <h1 class="login-title">Nordic Digital Library</h1>
    <p class="login-subtitle">你的個人數位圖書館<br>用 Google 帳號登入並授予 Drive 存取權限</p>

    <!-- Step 1: Client ID setup (shown only if not configured) -->
    <div class="step" id="step-setup">
      <div class="setup-label">第一次設定</div>
      <input type="text" class="setup-input" id="clientIdInput"
        placeholder="xxxxxxxx.apps.googleusercontent.com"
        autocomplete="off" spellcheck="false">
      <div class="setup-hint">
        請在 <a href="https://console.cloud.google.com/" target="_blank" rel="noopener">Google Cloud Console</a>
        建立 OAuth2 Client ID（類型選「網頁應用程式」），
        並將 <code style="background:rgba(0,0,0,0.06);padding:1px 4px;border-radius:3px;font-size:0.85em">https://liyanongithub.github.io</code>
        加入「已授權的 JavaScript 來源」。
      </div>
      <button class="setup-btn" onclick="saveClientId()">確認，下一步 →</button>
    </div>

    <!-- Step 2: Sign in with Google -->
    <div class="step" id="step-login">
      <button class="google-btn" id="googleBtn" onclick="doLogin()">
        <svg width="20" height="20" viewBox="0 0 24 24">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.47 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        用 Google 帳號登入
      </button>
      <button class="change-id-link" onclick="showSetup()">更換 Client ID</button>
    </div>

    <div class="error-msg" id="errorMsg"></div>
  </div>
</div>

<script src="js/storage.js"></script>
<script src="js/auth.js"></script>
<script>
  // Apply saved theme
  const theme = Storage.getSetting('readingMode') || 'normal';
  document.documentElement.setAttribute('data-theme', theme);

  // If already authenticated, redirect immediately
  if (Auth.isAuthenticated()) {
    const redirect = new URLSearchParams(location.search).get('redirect') || 'index.html';
    location.href = decodeURIComponent(redirect);
  }

  // Show correct step
  function showSetup() {
    document.getElementById('step-setup').classList.add('active');
    document.getElementById('step-login').classList.remove('active');
  }

  function showLogin() {
    document.getElementById('step-setup').classList.remove('active');
    document.getElementById('step-login').classList.add('active');
  }

  const clientId = Storage.getSetting('googleClientId');
  if (clientId) {
    showLogin();
  } else {
    showSetup();
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.style.display = 'block';
  }

  function hideError() {
    document.getElementById('errorMsg').style.display = 'none';
  }

  window.saveClientId = function() {
    const id = document.getElementById('clientIdInput').value.trim();
    if (!id || !id.includes('.apps.googleusercontent.com')) {
      showError('請輸入有效的 Client ID（格式：xxxxxxxx.apps.googleusercontent.com）');
      return;
    }
    Storage.setSetting('googleClientId', id);
    hideError();
    showLogin();
  };

  window.doLogin = async function() {
    hideError();
    const btn = document.getElementById('googleBtn');
    btn.disabled = true;
    btn.innerHTML = btn.innerHTML.replace('用 Google 帳號登入', '登入中…');

    try {
      await Auth.login();
      const redirect = new URLSearchParams(location.search).get('redirect') || 'index.html';
      location.href = decodeURIComponent(redirect);
    } catch (err) {
      btn.disabled = false;
      btn.innerHTML = btn.innerHTML.replace('登入中…', '用 Google 帳號登入');
      if (err?.message === 'NO_CLIENT_ID') {
        showSetup();
      } else if (err?.message === 'access_denied' || err?.type === 'popup_closed') {
        showError('登入已取消，請再試一次。');
      } else {
        showError('登入失敗：' + (err?.message || '未知錯誤'));
      }
    }
  };

  // Allow pressing Enter in the Client ID input
  document.getElementById('clientIdInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') window.saveClientId();
  });
</script>
</body>
</html>
